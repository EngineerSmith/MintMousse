site_name: MintMousse - Docs
repo_url: https://github.com/EngineerSmith/MintMousse
site_url: https://mintmousse.engineersmith.net

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - content.code.copy
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - md_in_html
  - def_list

plugins:
  - search
  - mike:
      version_selector: true
  - redirects:
      redirect_maps:
        'components/component/back.md': 'components/component/parent.md' # This doesn't work, but I'll look at it later
  - macros:
      module_name: macros

extra:
  version:
    provider: mike

extra_css:
  - assets/stylesheets/extra.css
