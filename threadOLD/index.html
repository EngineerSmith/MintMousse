<!doctype html>
<html data-bs-theme="dark">
<head>
  <meta charset="utf8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB sha512-2bBQCjcnw658Lho4nlXJcc6WkV/UxpE/sAokbXPxQNGqmNdQrWqtw26Ns9kFF/yG792pKR1Sx8/Y1Lf1XN4GKA==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link href="/index.css" rel="stylesheet" type="text/css">
  {{&icon}}
  <title>{{title}}</title>
</head>
<body>
  <nav class="navbar navbar-expand-sm bg-body-tertiary sticky-top">
    <div class="container-fluid d-flex align-items-center">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <span class="navbar-brand mb-0 h1">{{title}}</span>
      <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
        <div class="navbar-nav ms-sm-3">
          <ul class="nav nav-underline" role="tablist" id="tabNavbar"> <!-- Tab buttons added here --> </ul>
        </div>
      </div>

      <div class="ms-auto d-flex align-items-center gap-2">
        <small id ="disconnected-status-text" class="text-danger-emphasis me-2">Disconnected</small>
        <div id="connected-status" class="rounded-circle pulsing bg-success" style="width: 14px; height: 14px; display: none;" data-bs-toggle="tooltip" data-bs-placement="left" data-bs-title="Connected"></div>
        <div id="disconnected-status" class="rounded-circle bg-danger" style="width: 14px; height: 14px;"></div>
      </div>
    </div>
  </nav>
  <div id="loadingSpinner" class="centered-spinner">
    <div class="spinner-border" role="status" style="width: 5rem; height: 5rem;">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
  <div id="noContentContainer" class="d-flex" style="display: none !important;">
    <div class="alert alert-primary text-center" role="alert">
      There is currently no content to display.<br/>Please create a tab and add components to view content.<br/><strong class="text-info">Check out the <a href="#" class="link-info">wiki</a> for help.</strong>
    </div>
  </div>
  <div id="tabContent" class="tab-content" aria-live="polite"> <!-- Tab content added here --> </div>
  <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"> <!-- Toast content added here --> </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITx sha512-HvOjJrdwNpDbkGJIG2ZNqDlVqMo77qbs4Me4cah0HoDrfhrbA+8SBlZn1KrvAQw7cILLPFJvdwIgphzQmMm+Pw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdn.jsdelivr.net/npm/masonry-layout@4.2.2/dist/masonry.pkgd.min.js" integrity="sha384-GNFwBvfVxBkLMJpYMOABq3c+d3KnQxudP/mGPkzpZSTYykLBNsZEnG2D9G/X/+7D sha512-JRlcvSZAXT8+5SQQAvklXGJuxXTouyq8oIMaYERZQasB8SBDHZaUbeASsJWpk0UUrf89DP3/aefPPrlMR1h1yQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.2/dist/purify.min.js" integrity="sha384-8hAfZQ5Oqos5HLTHfR0sLvvwpcVI4fGhV+0Dj/HCcpkKaacivQs82XHmvLOnAhXn sha512-rndSwdufSisbe/CZtAvGqHpIDfhfjxuobglRImbkVhSAOOljb7FczGlnz1J2ia3XJEl590+mRjdNTFFK93gcYg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="/index.js"></script>
</body>
</html>
